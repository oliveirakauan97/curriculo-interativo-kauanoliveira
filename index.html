        .npc { background-color: #a3c1e0; border: 1px solid #666; padding: 5px; position: absolute; }

        const playerName = "Kauan";
        let dialog = document.getElementById('dialog');

        function showDialog(message) {
            dialog.innerHTML = message;
            dialog.style.display = 'block';
            setTimeout(() => dialog.style.display = 'none', 3000);
        }

        // Create NPCs
        const npc = document.createElement('div');
        npc.className = 'npc';
        npc.style.top = '100px';
        npc.style.left = '200px';
        npc.innerHTML = 'NPC: Hello, I am a Pokemon Trainer!';
        npc.onclick = () => showDialog('Boss: Ready to battle!');
        document.getElementById('game').appendChild(npc);

        }
